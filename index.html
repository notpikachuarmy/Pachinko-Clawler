<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Pachinkrawler - Prototipo Fase 3">
  <title>Pachinkrawler — Fase 3</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="game-page">
    <header class="game-header"><h1>Pachinkrawler</h1><p>Haz llegar los objetos a un buzón verde para activar su efecto.</p></header>
    <section class="hud" aria-label="Estado del combate">
      <div><span>Enemigo</span><strong id="enemy-hp">30/30</strong></div>
      <div><span>Vida</span><strong id="player-health">12/20</strong></div>
      <div><span>Armadura</span><strong id="player-armor">0</strong></div>
    </section>
    <section class="item-bar" aria-label="Selección de objeto">
      <button class="item-button is-selected" type="button" data-item-id="sword_test">Espada · 5 daño</button>
      <button class="item-button" type="button" data-item-id="shield_test">Escudo · 4 armadura</button>
      <button class="item-button" type="button" data-item-id="potion_test">Poción · 4 vida</button>
    </section>
    <section class="game-panel">
      <div id="game-container" aria-label="Tablero de Pachinkrawler"></div>
      <p id="event-log" class="event-log">Prueba los tres objetos en los buzones verdes.</p>
      <div class="controls">
        <p id="status">Cargando…</p>
        <div class="button-group">
          <button id="debug-button" class="secondary-button" type="button">Hitboxes: OFF</button>
          <button id="shake-button" class="secondary-button" type="button">Sacudir</button>
          <button id="board-button" class="secondary-button" type="button">Nuevo tablero</button>
          <button id="reset-button" type="button">Reiniciar</button>
        </div>
      </div>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/poly-decomp@0.3.0/build/decomp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
  <script src="./js/data/items.js"></script>
  <script src="./js/main.js"></script>
</body>
</html>
